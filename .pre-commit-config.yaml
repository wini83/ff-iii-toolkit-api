repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: ^\.codex$
      - id: end-of-file-fixer
        exclude: ^\.codex$
      - id: trailing-whitespace
        exclude: ^\.codex$
      - id: check-merge-conflict
        exclude: ^\.codex$
      - id: check-added-large-files
        exclude: ^\.codex$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run env PYTHONPATH=src mypy .
        language: system
        pass_filenames: false
      - id: deptry
        name: deptry
        entry: uv run deptry .
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.12.1
    hooks:
      - id: commitizen
        stages: [commit-msg]
