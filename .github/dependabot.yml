version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    open-pull-requests-limit: 5

    groups:
      fastapi-stack:
        patterns:
          - "fastapi"
          - "starlette"
          - "pydantic"

      db-stack:
        patterns:
          - "sqlalchemy"
          - "alembic"

      http-stack:
        patterns:
          - "httpx"
          - "anyio"

      tooling:
        patterns:
          - "pytest"
          - "mypy"
          - "ruff"
          - "pre-commit"

      other:
        patterns:
          - "*"
        exclude-patterns:
          - "fastapi"
          - "starlette"
          - "pydantic"
          - "sqlalchemy"
          - "alembic"
          - "httpx"
          - "anyio"
          - "pytest"
          - "mypy"
          - "ruff"
          - "pre-commit"

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    commit-message:
      prefix: "deps"

    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    open-pull-requests-limit: 3

    groups:
      github-actions:
        patterns:
          - "*"

    commit-message:
      prefix: "ci"

    labels:
      - "dependencies"
      - "github-actions"
